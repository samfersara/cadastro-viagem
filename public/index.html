<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ficha de Viagem</title>

  <style>
    body{
      font-family:Segoe UI, Arial, sans-serif;
      background:#eef2f7;
      display:flex;
      justify-content:center;
      padding:30px;
      margin:0;
    }

    .card{
      background:white;
      padding:30px;
      border-radius:12px;
      width:900px;
      max-width:100%;
      box-shadow:0 10px 35px rgba(0,0,0,0.1);
    }

    h1{
      margin-bottom:10px;
    }

    h2{
      margin-top:30px;
      border-bottom:1px solid #eee;
      padding-bottom:6px;
    }

    .box{
      background:#f8fafc;
      padding:15px;
      border-radius:8px;
      margin-bottom:20px;
    }

    input,select{
      width:100%;
      padding:10px;
      margin:6px 0 14px;
      border:1px solid #ccc;
      border-radius:6px;
      box-sizing:border-box;
    }

    button{
      background:#2563eb;
      color:white;
      padding:15px;
      border:none;
      border-radius:8px;
      width:100%;
      font-size:16px;
      cursor:pointer;
    }

    button:disabled{
      background:#94a3b8;
    }

    #msg{
      display:none;
      background:#dcfce7;
      border:1px solid #86efac;
      padding:12px;
      border-radius:8px;
      margin-bottom:15px;
      color:#166534;
      font-weight:600;
    }

    .label{
      display:block;
      font-weight:600;
      margin-top:6px;
      color:#334155;
    }

    .hint{
      font-size:12px;
      color:#64748b;
      margin-top:-6px;
      margin-bottom:12px;
    }

    @media (max-width:700px){
      .card{
        padding:20px;
      }
    }

    .termo-box{
  background:linear-gradient(135deg,#1e3a8a,#2563eb);
  color:white;
  padding:18px;
  border-radius:10px;
  margin-bottom:20px;
  box-shadow:0 8px 25px rgba(37,99,235,0.3);
}

.termo-content{
  display: block;
}
  </style>
</head>
<body>

  <div class="card">
    <h1>Ficha Oficial da Viagem</h1>

    <div class="termo-box">
  <div class="termo-content">
    <div>
      <strong>⚠️ Termo de Autorização Obrigatório</strong>
      <div class="termo-desc">
        Baixe o termo, preencha, assine e envie no final do cadastro.
      </div>
    </div>

    <a href="/docs/termo_autorizacao.docx" download class="btn-termo">
      📄 Baixar Termo
    </a>
  </div>
</div>

    <div id="msg"></div>

    <form id="form" enctype="multipart/form-data">
      <h2>Viajante</h2>

      <div class="box">
        <label class="label">Nome do viajante</label>
        <input name="viajante_nome" required>
      </div>

      <label class="label">Possui cônjuge?</label>
      <select id="temConjuge" name="temConjuge" required>
        <option value="">Selecione</option>
        <option>Não</option>
        <option>Sim</option>
      </select>

      <div id="conjugeArea"></div>

      <label class="label">Quantidade de filhos</label>
      <input type="number" id="qtdFilhos" name="qtdFilhos" min="0" required>

      <div id="filhosArea"></div>

      <h2>Uploads obrigatórios</h2>

      <div id="uploadsArea"></div>

      <button id="btn" type="submit">FINALIZAR CADASTRO</button>
    </form>
  </div>

  <script>
    const form = document.getElementById("form");
    const btn = document.getElementById("btn");
    const msg = document.getElementById("msg");
    const temConjuge = document.getElementById("temConjuge");
    const qtdFilhos = document.getElementById("qtdFilhos");
    const conjugeArea = document.getElementById("conjugeArea");
    const filhosArea = document.getElementById("filhosArea");
    const uploadsArea = document.getElementById("uploadsArea");

    function blocoConjuge(){
      return `
        <div class="box">
          <label class="label">Nome do cônjuge</label>
          <input name="conjuge_nome" required>
        </div>
      `;
    }

    function blocoFilho(i){
      return `
        <div class="box">
          <label class="label">Nome do filho ${i}</label>
          <input name="filho${i}_nome" required>
        </div>
      `;
    }

    function blocoUploads(prefix, titulo, incluirTermo = false){
      return `
        <div class="box">
          <h3>${titulo}</h3>

          <label class="label">Documento RG/CPF</label>
          <input type="file" name="${prefix}_rgCpfFile" accept="image/*,.pdf" capture="environment" required>

          <label class="label">Carteira de vacinação</label>
          <input type="file" name="${prefix}_vacina" accept="image/*,.pdf" capture="environment" required>

          ${incluirTermo ? `
            <label class="label">Termo de autorização</label>
            <input type="file" name="${prefix}_termoAutorizacao" accept="image/*,.pdf" capture="environment" required>
            <div class="hint">Envie foto ou PDF do termo assinado.</div>
          ` : ""}
        </div>
      `;
    }

    function renderUploads(){
      let html = blocoUploads("viajante", "Uploads do viajante", true);

      if (temConjuge.value === "Sim") {
        html += blocoUploads("conjuge", "Uploads do cônjuge");
      }

      const n = parseInt(qtdFilhos.value || 0, 10);
      for(let i = 1; i <= n; i++){
        html += blocoUploads(`filho${i}`, `Uploads do filho ${i}`);
      }

      uploadsArea.innerHTML = html;
    }

    function toggleConjuge(){
      if(temConjuge.value === "Sim"){
        conjugeArea.innerHTML = blocoConjuge();
      } else {
        conjugeArea.innerHTML = "";
      }
      renderUploads();
    }

    function gerarFilhos(){
      filhosArea.innerHTML = "";
      const n = parseInt(qtdFilhos.value || 0, 10);

      for(let i = 1; i <= n; i++){
        filhosArea.innerHTML += blocoFilho(i);
      }

      renderUploads();
    }

    function showMsg(text){
      msg.innerText = text;
      msg.style.display = "block";

      setTimeout(() => {
        msg.style.display = "none";
      }, 4000);
    }

    function resetFormCustom(){
      form.reset();
      conjugeArea.innerHTML = "";
      filhosArea.innerHTML = "";
      uploadsArea.innerHTML = blocoUploads("viajante", "Uploads do viajante", true);
    }

    function validarFormulario(){
      const obrigatorios = form.querySelectorAll("[required]");

      for(const campo of obrigatorios){
        if(campo.type === "file"){
          if(!campo.files || campo.files.length === 0){
            alert("Envie todos os documentos obrigatórios.");
            campo.focus();
            return false;
          }
        } else {
          if(!campo.value){
            alert("Preencha todos os campos obrigatórios.");
            campo.focus();
            return false;
          }
        }
      }

      return true;
    }

    function enviar(e){
      e.preventDefault();

      if(!validarFormulario()) return;

      btn.innerText = "Enviando...";
      btn.disabled = true;

      const xhr = new XMLHttpRequest();

      xhr.onload = function(){
        btn.innerText = "FINALIZAR CADASTRO";
        btn.disabled = false;

        let resp;
        try{
          resp = JSON.parse(xhr.responseText);
        }catch{
          resp = { ok:false, message:"Resposta inválida do servidor." };
        }

        if(resp.ok){
          showMsg("Cadastro feito com sucesso!");
          resetFormCustom();
        } else {
          alert(resp.message || "Erro no envio");
        }
      };

      xhr.onerror = function(){
        btn.innerText = "FINALIZAR CADASTRO";
        btn.disabled = false;
        alert("Erro de conexão com o servidor.");
      };

      xhr.open("POST", "/enviar");
      xhr.send(new FormData(form));
    }

    temConjuge.addEventListener("change", toggleConjuge);
    qtdFilhos.addEventListener("change", gerarFilhos);
    form.addEventListener("submit", enviar);

    renderUploads();
  </script>

</body>
</html>
